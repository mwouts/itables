<!--| quarto-html-table-processing: none -->
<div id="table_id" style="div_style">Loading pyaggrid...</div>
<div class="pyaggrid-caption" style="text-align:center">caption</div>
<div class="pyaggrid-downsampling-warning">downsampling_warning</div>
<script type="module">
    import { AgGridTable } from 'https://www.unpkg.com/pyaggrid/aggrid_bundle.js';

    document.querySelectorAll('#table_id:not([data-pyaggrid])').forEach(div => {
        div.dataset.pyaggrid = 'true';
        div.textContent = '';
        let gridOptions = {};
        let data = [];

        new AgGridTable(div, {
            data_json: JSON.stringify(data),
            grid_options: gridOptions,
        });
    });
</script>
