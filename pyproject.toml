# The ITables repository hosts several Python packages - see python/*/pyproject.toml:
# - python/itables_core: the core functions shared by the renderers
# - python/pydatatables: the DataTables renderer
# - python/pyaggrid: the AG Grid renderer
# - python/itables: the backward-compatible wrapper around pydatatables
#
# This file only contains the repository-level tool configuration.
# The Pixi workspace is defined in pixi.toml.

[tool.coverage.report]
exclude_lines = [
    # Have to re-enable the standard pragma
    "pragma: no cover",

    # Don't complain if tests don't hit defensive assertion code:
    "raise NotImplementedError",
    "except ImportError",
  ]

[tool.pyright]
typeCheckingMode = "standard"
ignore = [
    "apps/*/marimo",
    "apps/*/panel",
    "python/pydatatables/src/pydatatables_for_dash/DataTable.py",
    "research",
]
strict = [
    "docs",
    "apps",
    "python/pydatatables/src/pydatatables_for_dash",
    "python/pydatatables/src/pydatatables/__init__.py",
    "python/pydatatables/src/pydatatables/dash.py",
    "python/pydatatables/src/pydatatables/streamlit.py",
    "python/pyaggrid/src/pyaggrid/__init__.py",
    ]
