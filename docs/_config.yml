title: Interactive Tables
author: Marc Wouts
copyright: "2019-2026"
logo: "../src/itables/logo/logo.svg"
execute:
  execute_notebooks: force
# The docs/py folder holds the py:percent mirrors of the docs (used for linting
# and formatting only), so we exclude it from the site build. The other entries
# are Jupyter Book's defaults, which we have to repeat as this key overrides them.
exclude_patterns: [_build, Thumbs.db, .DS_Store, "**.ipynb_checkpoints", py]
sphinx:
  config:
    html_extra_path: ['quarto']
    # Fixes the "rocket icon" JupyterLite link, which sphinx-book-theme
    # renders relative to the site root without adjusting for how deep the
    # current page is nested -- see the file itself for details.
    html_js_files: ['fix_jupyterlite_links.js']
    rediraffe_branch: main
    rediraffe_redirects:
      advanced_parameters.md: options/options.md
      extensions.md: options/buttons.md
      select.md: options/select.md
      custom_css.md: css.md
      dash.md: apps/dash.md
      html_export.md: apps/html.md
      shiny.md: apps/shiny.md
      quarto.md: apps/quarto.md
      streamlit.md: apps/streamlit.md
      widget.md: apps/widget.md
      sample_dataframes.md: pandas_dataframes.md
    # Let the "rocket icon" launch button below open each doc page (a MyST
    # notebook) directly as a live JupyterLite notebook with a Pyodide kernel.
    # jupyter-plainb (installed as a JupyterLite federated extension) can
    # render a .md file as a notebook directly, but isn't the default viewer
    # for .md; docs/overrides.json makes it the default one, so no .ipynb
    # conversion step is needed. docs/stage_jupyterlite_contents.py (run
    # before this build) stages the content with the "docs/" prefix the
    # launch button expects, and (re)generates docs/jupyter-lite.json so the
    # Pyodide kernel preloads the latest itables wheel from PyPI at startup --
    # otherwise `import itables` would need an explicit %pip install cell.
    jupyterlite_overrides: "overrides.json"
  extra_extensions:
    - sphinxext.rediraffe
    - jupyterlite_sphinx
repository:
  url: https://github.com/mwouts/itables
  path_to_book: docs
  branch: main
html:
  use_edit_page_button: true
  use_repository_button: true
  use_issues_button: true
launch_buttons:
  notebook_interface: "jupyterlab"
  jupyterlite_url: "lite/lab/index.html"
