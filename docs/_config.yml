title: Interactive Tables
author: Marc Wouts
copyright: "2019-2026"
execute:
  execute_notebooks: force
# The docs/py folder holds the py:percent mirrors of the docs (used for linting
# and formatting only), so we exclude it from the site build. The other entries
# are Jupyter Book's defaults, which we have to repeat as this key overrides them.
exclude_patterns: [_build, Thumbs.db, .DS_Store, "**.ipynb_checkpoints", py]
sphinx:
  config:
    html_extra_path: ['quarto']
    html_static_path: ['_static']
    html_css_files: ['custom.css']
    # pydata-sphinx-theme swaps these based on the page's own data-theme
    # attribute (the light/dark toggle), unlike a plain `logo:` key or a
    # `prefers-color-scheme` media query in the SVG itself, neither of which
    # track that toggle (#426).
    html_theme_options:
      home_page_in_toc: true
      logo:
        image_light: "../src/itables/logo/logo.svg"
        image_dark: "../src/itables/logo/logo-dark.svg"
    rediraffe_branch: main
    rediraffe_redirects:
      quick_start.md: index.md
      advanced_parameters.md: options/options.md
      extensions.md: options/buttons.md
      select.md: options/select.md
      custom_css.md: css.md
      dash.md: apps/dash.md
      html_export.md: apps/html.md
      shiny.md: apps/shiny.md
      quarto.md: apps/quarto.md
      streamlit.md: apps/streamlit.md
      widget.md: apps/widget.md
      sample_dataframes.md: pandas_dataframes.md
  extra_extensions:
    - sphinxext.rediraffe
repository:
  url: https://github.com/mwouts/itables
  path_to_book: docs
  branch: main
html:
  use_edit_page_button: true
  use_repository_button: true
  use_issues_button: true
launch_buttons:
  notebook_interface: "jupyterlab"
  binderhub_url: "https://mybinder.org"
