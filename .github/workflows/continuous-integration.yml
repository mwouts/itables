name: CI
on:
  push:
    paths-ignore:
      - 'CHANGELOG.md'
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 11 * * 4'

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  zizmor:
    name: zizmor
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - name: Run zizmor 🌈
        uses: zizmorcore/zizmor-action@192e21d79ab29983730a13d1382995c2307fbcaa # v0.5.7
      - name: Fail on medium+ severity findings
        uses: zizmorcore/zizmor-action@192e21d79ab29983730a13d1382995c2307fbcaa # v0.5.7
        with:
          advanced-security: false
          annotations: true
          min-severity: medium

  pre-commit:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - name: Setup Pixi
        uses: prefix-dev/setup-pixi@a09b6247153796b190642a2b53fac4241043cf6f # v0.10.0
        with:
          pixi-version: latest
          locked: false
          frozen: true
          cache: true
      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: 3.11
      - uses: pre-commit/action@2c7b3805fd2a0fd8c1884dcaebf91fc102a13ecd # v3.0.1

  pyright:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - name: Setup Pixi
        uses: prefix-dev/setup-pixi@a09b6247153796b190642a2b53fac4241043cf6f # v0.10.0
        with:
          pixi-version: latest
          locked: false
          frozen: true
          cache: true
      - run: pixi run pyright

  codeql:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - name: Initialize CodeQL
        uses: github/codeql-action/init@7188fc363630916deb702c7fdcf4e481b751f97a # v4.37.1
        with:
          languages: python, javascript
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@7188fc363630916deb702c7fdcf4e481b751f97a # v4.37.1

  pytest:
    needs: build-wheel
    strategy:
      fail-fast: false
      matrix:
        python-version: [3.9, "3.10", "3.11", "3.12", "3.13", "3.14"]
        pandas-version: [latest]
        numpy-version: [latest]
        typeguard-version: [latest]
        include:
          - python-version: "3.13"
            pandas-version: pre
          - python-version: "3.13"
            uninstall_non_essential_dependencies: true
          - python-version: "3.10"
            typeguard-version: "<4.4.1"
          - python-version: "3.10"
            typeguard-version: "<4"
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set up uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2

      - name: Download the pre-built wheel
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7
        with:
          name: itables-wheel
          path: dist

      - name: Install a development version of 'itables'
        # Install from the wheel built once in build-wheel, instead of rebuilding
        # the JS bundle (via pip install -e .) in every matrix job.
        run: uv pip install --system "$(ls dist/itables-*.whl)[test-all]"

      - name: Install pandas latest
        if: matrix.pandas-version == 'latest'
        run: uv pip install --system pandas
      - name: Install pandas pre-release
        if: matrix.pandas-version == 'pre'
        run: uv pip install --system pandas --pre
      - name: Install pandas ${{ matrix.pandas-version }}
        if: matrix.pandas-version != 'pre' && matrix.pandas-version != 'latest'
        run: uv pip install --system 'pandas${{ matrix.pandas-version }}'
      - name: Install numpy ${{ matrix.numpy-version }}
        if: matrix.numpy-version != 'latest'
        run: uv pip install --system 'numpy${{ matrix.numpy-version }}'
      - name: Install typeguard ${{ matrix.typeguard-version }}
        if: matrix.typeguard-version != 'latest'
        run: uv pip install --system 'typeguard${{ matrix.typeguard-version }}'

      - name: Install shiny
        run: uv pip install --system "shiny>=1.0" shinywidgets

      - name: Uninstall non-essential dependencies
        if: matrix.uninstall_non_essential_dependencies
        run: uv pip uninstall --system polars jinja2 dash anywidget streamlit shiny shinywidgets

      - name: Install a Jupyter Kernel
        run: python -m ipykernel install --name itables --user

      - name: Test with pytest
        run: pytest -n auto --cov=./ --cov-report=xml

      - name: Upload coverage
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7
        with:
          fail_ci_if_error: true
          verbose: true

  pytest-pixi:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Setup Pixi
        uses: prefix-dev/setup-pixi@a09b6247153796b190642a2b53fac4241043cf6f # v0.10.0
        with:
          pixi-version: latest
          locked: false
          frozen: true
          cache: true

      - name: Install a Jupyter Kernel
        run: pixi run python -m ipykernel install --name itables --user

      - name: Test with pytest
        run: pixi run pytest -n auto --cov=./ --cov-report=xml

      - name: Upload coverage
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7
        with:
          fail_ci_if_error: true
          verbose: true

  pytest-pixi-updated:
    # This job re-tests against updated pixi/conda-forge dependencies. It overlaps
    # with the weekly `schedule` trigger, so skip it on PRs to keep them faster.
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Setup Pixi
        uses: prefix-dev/setup-pixi@a09b6247153796b190642a2b53fac4241043cf6f # v0.10.0
        with:
          pixi-version: latest
          locked: false
          frozen: true
          cache: true

      - name: Update pixi environment
        run: pixi update

      - name: Install a Jupyter Kernel
        run: pixi run python -m ipykernel install --name itables --user

      - name: Test with pytest
        run: pixi run pytest -n auto --cov=./ --cov-report=xml

      - name: Upload coverage
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7
        with:
          fail_ci_if_error: true
          verbose: true

  pytest-playwright:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Setup Pixi
        uses: prefix-dev/setup-pixi@a09b6247153796b190642a2b53fac4241043cf6f # v0.10.0
        with:
          pixi-version: latest
          locked: false
          frozen: true
          cache: true

      - name: Install Playwright's Chromium browser
        run: pixi run -e playwright playwright install --with-deps chromium

      - name: Test with pytest
        run: pixi run -e playwright pytest tests/playwright

  pytest-minimal-deps:
    strategy:
      fail-fast: false
      matrix:
        environment:
          - minimal
          - test-pandas-notebook
          - test-polars-notebook
          - test-pandas-dash
          - test-polars-dash
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Setup Pixi
        uses: prefix-dev/setup-pixi@a09b6247153796b190642a2b53fac4241043cf6f # v0.10.0
        with:
          pixi-version: latest
          locked: false
          frozen: true
          cache: true

      - name: Install a Jupyter Kernel
        if: endsWith(matrix.environment, 'notebook')
        run: pixi run -e ${{ matrix.environment }} python -m ipykernel install --name itables --user

      - name: Test with pytest in ${{ matrix.environment }}
        run: pixi run -e ${{ matrix.environment }} pytest -n auto --cov=./ --cov-report=xml

      - name: Upload coverage
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7
        with:
          fail_ci_if_error: false
          verbose: true

  build-wheel:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - name: Set up Node
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: 3.11
      - name: Install hatch
        # hatch==1.16.0 fails with
        # hatchling.plugin.exceptions.UnknownPluginError: Unknown build hook: jupyter-builder
        run : pip install 'hatch<1.16' 'virtualenv<21' # https://github.com/pypa/hatch/issues/2193
      - name: Build package
        run: hatch build
      - name: Check LICENSE.txt in wheel
        run: unzip -l dist/*.whl | grep -q itables_for_dash/async-ITable.js.LICENSE.txt
      - name: Check LICENSE.txt in sdist
        run: tar -tvf dist/*.tar.gz | grep -q itables_for_dash/async-ITable.js.LICENSE.txt

      # Upload the wheel and sdist as artifacts
      - name: Upload wheel
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: itables-wheel
          path: dist/itables-*.whl

      - name: Upload sdist
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: itables-sdist
          path: dist/itables-*.tar.gz

  build-conda:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Compute the itables version
        run: echo "ITABLES_VERSION=$(grep -oP '(?<=__version__ = \")[^\"]+' src/itables/version.py)" >> "$GITHUB_ENV"

      - name: Build conda package with rattler-build
        uses: prefix-dev/rattler-build-action@1ca5f45832f419a46d1326ccc5861d7e14d67c44 # v0.2.39
        with:
          rattler-build-version: v0.69.1
          artifact-name: itables-conda-package

  comment-on-pr:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
      pull-requests: write
    needs: [build-wheel, build-conda]
    if: github.event_name == 'pull_request'
    steps:
      - name: Comment with direct artifact link
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9
        env:
          HEAD_REPO_FULL_NAME: ${{ github.event.pull_request.head.repo.full_name }}
          HEAD_REF: ${{ github.event.pull_request.head.ref }}
        with:
          script: |
            const pr_number = context.payload.pull_request.number;
            const run_id = context.runId;
            const marker = '<!-- itables-artifact-link -->';
            const headRepoFullName = process.env.HEAD_REPO_FULL_NAME;
            const headRef = process.env.HEAD_REF;

            // List artifacts for this run
            const { data: { artifacts } } = await github.rest.actions.listWorkflowRunArtifacts({
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: run_id,
            });

            // Find the artifact named 'itables-wheel'
            let artifact = artifacts.find(a => a.name === 'itables-wheel');
            let wheel_url;
            if (artifact) {
              wheel_url = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${run_id}/artifacts/${artifact.id}`;
            } else {
              wheel_url = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${run_id}#artifacts`;
            }

            // Find the artifact named 'itables-conda-package'
            artifact = artifacts.find(a => a.name === 'itables-conda-package');
            let conda_url;
            if (artifact) {
              conda_url = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${run_id}/artifacts/${artifact.id}`;
            } else {
              conda_url = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${run_id}#artifacts`;
            }


            const body = `${marker}
            Thank you for making this pull request.

            Did you know? You can try it on Binder: [![Binder:lab](https://img.shields.io/badge/binder-jupyterlab-0172B2.svg)](https://mybinder.org/v2/gh/${headRepoFullName}/${headRef}?urlpath=lab/tree/docs/quick_start.md).

            Also, the version of ITables developed in this PR is available as a wheel artifact :package: for easy installation.
            Download it [here](${wheel_url}), unzip it and then run <code>pip install itables-xxx.whl</code> in the unzipped directory.

            A conda package is also available for easy installation:
            Download it [here](${conda_url}), and then run <code>conda install itables-xxx.tar.bz2</code> in the directory where you downloaded the file.
            `;

            // List comments on the PR
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr_number,
            });

            // Find existing comment by this workflow (by marker)
            const existing = comments.find(
              c => c.user.type === 'Bot' && c.body && c.body.includes(marker)
            );

            if (existing) {
              // Update the existing comment
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              // Create a new comment
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr_number,
                body,
              });
            }
