  # Only run this when the main branch changes
on:
  push:
    branches:
    - main
    # If your git repository has the Jupyter Book within some-subfolder next to
    # unrelated files, you can make this run only if a file within that specific
    # folder has been modified.
    #
    # paths:
    # - docs/**

# This job installs dependencies, builds the book, and pushes it to `gh-pages`
jobs:
  deploy-book:
    # Grant GITHUB_TOKEN the permissions required to make a Pages deployment
    permissions:
      pages: write      # to deploy to Pages
      id-token: write   # to verify the deployment originates from an appropriate source

    # Deploy to the github-pages environment
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6

    - name: Set up Node
      uses: actions/setup-node@v6

    - name: Set up Python 3.11
      uses: actions/setup-python@v6
      with:
        python-version: 3.11

    - name: Install dependencies
      run: |
        pip install 'jupyter-book<2' sphinxext-rediraffe
        pip install matplotlib  # Pandas style
        pip install ./python/itables_core "./python/pydatatables[all]" ./python/pyaggrid ./python/itables

    - name: Create a kernel
      run: |
        pip install ipykernel
        python -m ipykernel install --name itables --user

    - name: Install Quarto
      uses: quarto-dev/quarto-actions/setup@v2

    - name: Render the quarto examples
      run: |
        for qmd_file in `ls docs/*/quarto/*.qmd`; do quarto render ${qmd_file}; done

    # Build the three books: the historical ITables book stays at the site
    # root (so the existing links keep working), and the PyDataTables and
    # PyAgGrid books are published under /pydatatables and /pyaggrid
    - name: Build the ITables book
      run: |
        jupyter-book build docs/itables

    - name: Build the PyDataTables book
      run: |
        jupyter-book build docs/pydatatables

    - name: Build the PyAgGrid book
      run: |
        jupyter-book build docs/pyaggrid

    - name: Assemble the website
      run: |
        mkdir -p docs/_build
        cp -r docs/itables/_build/html docs/_build/html
        cp -r docs/pydatatables/_build/html docs/_build/html/pydatatables
        cp -r docs/pyaggrid/_build/html docs/_build/html/pyaggrid

    # Upload the book's HTML as an artifact
    - name: Upload artifact
      uses: actions/upload-pages-artifact@v5
      with:
        path: "docs/_build/html"

    # Deploy the book's HTML to GitHub Pages
    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v5
