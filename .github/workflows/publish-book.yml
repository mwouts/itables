  # Only run this when the main branch changes
on:
  push:
    branches:
    - main
    # If your git repository has the Jupyter Book within some-subfolder next to
    # unrelated files, you can make this run only if a file within that specific
    # folder has been modified.
    #
    # paths:
    # - docs/**

# This job installs dependencies, builds the book, and pushes it to `gh-pages`
jobs:
  deploy-book:
    # Grant GITHUB_TOKEN the permissions required to make a Pages deployment
    permissions:
      pages: write      # to deploy to Pages
      id-token: write   # to verify the deployment originates from an appropriate source

    # Deploy to the github-pages environment
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6

    - name: Set up Pixi
      uses: prefix-dev/setup-pixi@v0
      with:
        environments: docs

    - name: Create a kernel
      run: pixi run -e docs python -m ipykernel install --name itables --user

    - name: Install Quarto
      uses: quarto-dev/quarto-actions/setup@v2

    - name: Render the quarto examples
      run: |
        for qmd_file in `ls docs/quarto/*.qmd`; do quarto render ${qmd_file}; done

    # Build the book
    - name: Build the book
      run: pixi run -e docs jupyter-book build --html --execute

    # Include quarto-rendered HTML in the output
    - name: Copy quarto output into build
      run: cp -r docs/quarto _build/html/quarto

    # Upload the book's HTML as an artifact
    - name: Upload artifact
      uses: actions/upload-pages-artifact@v5
      with:
        path: "_build/html"

    # Deploy the book's HTML to GitHub Pages
    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v5
