<!--| quarto-html-table-processing: none -->
<table id="table_id">
  <tbody>
    <tr hidden="hidden">
      <td style="vertical-align:middle; text-align:left">
        Loading ITables v{itables_version} from the internet...
        (need <a href=https://mwouts.github.io/itables/troubleshooting.html>help</a>?)
      </td>
    </tr>
  </tbody>
</table>
<script>document.querySelector("#table_id [hidden]")?.removeAttribute("hidden")</script>
<noscript><table border="1" cellpadding="4"><caption>ITables can't run JavaScript in this context - defaulting to a <a href=https://mwouts.github.io/itables/troubleshooting.html#static-preview-instead-of-the-interactive-table>static preview</a></caption><thead>    <tr style="text-align: right;">
      <th>int</th>
      <th>float</th>
      <th>str</th>
      <th>category</th>
    </tr></thead><tbody>
<tr><td>0</td><td>5.000000</td><td>a</td><td>low</td></tr>
<tr><td>1</td><td>4.949495</td><td>b</td><td>medium</td></tr>
<tr><td>2</td><td>4.898990</td><td>c</td><td>high</td></tr>
<tr><td>3</td><td>4.848485</td><td>d</td><td>medium</td></tr>
<tr><td>4</td><td>4.797980</td><td>e</td><td>low</td></tr>
</tbody></table></noscript>
<link href="https://www.unpkg.com/dt_for_itables@{dt_for_itables_version}/dt_bundle.css" rel="stylesheet">
<script type="module">
    import { ITable, jQuery as $ } from 'https://www.unpkg.com/dt_for_itables@{dt_for_itables_version}/dt_bundle.js';

    document.querySelectorAll("#table_id:not(.dataTable)").forEach(table => {
        if (!(table instanceof HTMLTableElement))
            return;

        let dt_args = {
          "classes": ["display", "nowrap", "compact"],
          "columnDefs": [{"render": "function (data, type, row, meta) { return type === 'sort' || type === 'type' ? data[1] : data[0]; }", "targets": [1]}, {"render": "function (data, type, row, meta) { var categories = [\"high\", \"low\", \"medium\"]; return type === 'sort' ? data : (data === 0 ? null : categories[data - 1]); }", "targets": 3}],
          "data_json": "[[0, [\"5.000000\", 5.0], \"a\", 2], [1, [\"4.949495\", 4.94949494949495], \"b\", 3], [2, [\"4.898990\", 4.898989898989899], \"c\", 1], [3, [\"4.848485\", 4.848484848484849], \"d\", 3], [4, [\"4.797980\", 4.797979797979798], \"e\", 2]]",
          "keys_to_be_evaluated": [["columnDefs", 0, "render"], ["columnDefs", 1, "render"]],
          "layout": {"bottomEnd": null, "bottomStart": null, "topEnd": null, "topStart": null},
          "order": [],
          "style": {"caption-side": "bottom", "margin": "auto", "table-layout": "auto", "width": "auto"},
          "table_html": "<table><thead>\n    <tr style=\"text-align: right;\">\n      \n      <th>int</th>\n      <th>float</th>\n      <th>str</th>\n      <th>category</th>\n    </tr>\n  </thead></table>",
          "text_in_header_can_be_selected": true
        };
        new ITable(table, dt_args);
    });
</script>
